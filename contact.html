<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Hermode Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0A84FF;
            --primary-hover: #0070E0;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #515154;
            --border-color: #E5E5EA;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.desc {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-size: 15px;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
            background-color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button[type="submit"] {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(10, 132, 255, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .note {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>お問い合わせ / Contact</h1>
            <p class="desc">ご質問やご要望がありましたら、以下のフォームよりお気軽にご連絡ください。<br>Please feel free to contact us using the form below.</p>
        </div>

        <!-- 
        NOTE:
        Please register for a free Formspree account (https://formspree.io/) 
        and replace 'YOUR_FORMSPREE_ID' with your actual form ID to receive emails.
        -->
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
            <div class="form-group">
                <label for="name">お名前 / Name</label>
                <input type="text" id="name" name="name" required placeholder="Taro Yamada">
            </div>

            <div class="form-group">
                <label for="email">メールアドレス / Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="subject">件名 / Subject</label>
                <input type="text" id="subject" name="subject" required placeholder="Inquiry about Hermode Piano">
            </div>

            <div class="form-group">
                <label for="message">お問い合わせ内容 / Message</label>
                <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
            </div>

            <button type="submit">送信する / Send</button>
        </form>

        <a href="index.html" class="back-link">← プライバシーポリシーに戻る / Back to Privacy Policy</a>
    </div>

</body>
</html>
